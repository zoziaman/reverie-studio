name: Reverie Studio Tests

on:
  push:
    branches: [ "refactor/v60.1.0", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ────────────────────────────────────────────
  # Job 1: Python 단위 테스트
  # ────────────────────────────────────────────
  python-tests:
    name: Python Tests (3.10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        # requirements-dev.txt = requirements.txt + pytest + pytest-qt + nuitka
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/test_gui_runtime.py tests/test_pack_security.py -v --tb=short
        env:
          # 팩 암호화 키: secret 등록 시 실팩 로드 테스트도 실행됨
          # 미등록 시 → test_load_real_pack_dev_mode 자동 skip (정상 동작)
          REVERIE_PACK_PASSWORD: ${{ secrets.REVERIE_PACK_PASSWORD }}
          REVERIE_PACK_SALT: ${{ secrets.REVERIE_PACK_SALT }}
          # CI 환경: .revpack 없으므로 Fernet/load 테스트 자동 skip

  # ────────────────────────────────────────────
  # Job 2: Firebase Functions 린트
  # ────────────────────────────────────────────
  functions-lint:
    name: Firebase Functions Lint (Node 24)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Syntax check (require index.js)
        run: node -e "require('./functions/index.js')"
        env:
          # Firebase Admin SDK가 initializeApp() 호출 시 환경변수 없으면 에러
          # GOOGLE_APPLICATION_CREDENTIALS 없이 require만 하므로 에러 무시
          FIREBASE_FUNCTIONS_TEST: "true"
