name: Public Snapshot Checks

on:
  push:
    branches:
      - main
      - codex/public-snapshot-clean
  pull_request:
    branches:
      - main

jobs:
  public-demo:
    name: Public dry-run demo and safety checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: python -m pip install pytest

      - name: Run public demo tests
        run: python -m pytest tests/test_public_demo.py tests/test_public_readiness_tools.py tests/test_public_verify.py -q
        env:
          PYTHONPATH: src

      - name: Run public verification bundle
        run: python scripts/public_verify.py --out "$RUNNER_TEMP/reverie-public-verify"
        env:
          PYTHONPATH: src

  functions-syntax:
    name: Firebase Functions syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Require Firebase function module
        run: node -e "require('./functions/index.js')"
        env:
          FIREBASE_FUNCTIONS_TEST: "true"
